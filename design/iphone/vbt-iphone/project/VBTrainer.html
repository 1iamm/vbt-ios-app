<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>VBTrainer · iPhone Design</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  /* hide scrollbars inside artboards */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="vbt-tokens.jsx"></script>
<script type="text/babel" src="vbt-charts.jsx"></script>
<script type="text/babel" src="vbt-screens.jsx"></script>
<script type="text/babel" src="vbt-system.jsx"></script>
<script type="text/babel" src="vbt-tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const App = () => {
  const [tweaks, setTweak] = useTweaks(VBT_TWEAK_DEFAULTS);
  return (
    <TweakProvider value={tweaks}>
      <VBTTweaksPanel tweaks={tweaks} setTweak={setTweak}/>
      <DesignCanvas>

    <DCSection id="hero" title="VBTrainer · iPhone" subtitle="VBT 力量训练 · 数据采集与复盘 · iOS 18+ 视觉语言 · 浅色 / 深色双主题">
      <DCArtboard id="today-light"  label="Today · Light"     width={402} height={874}><TodayScreenT dark={false}/></DCArtboard>
      <DCArtboard id="today-dark"   label="Today · Dark"      width={402} height={874}><TodayScreenT dark={true}/></DCArtboard>
      <DCArtboard id="detail-light" label="单次训练详情 · Light" width={402} height={874}><DetailScreenT dark={false}/></DCArtboard>
      <DCArtboard id="detail-dark"  label="单次训练详情 · Dark"  width={402} height={874}><DetailScreenT dark={true}/></DCArtboard>
      <DCArtboard id="trends-light" label="长期趋势 · Light"   width={402} height={874}><TrendsScreen dark={false}/></DCArtboard>
      <DCArtboard id="trends-dark"  label="长期趋势 · Dark"    width={402} height={874}><TrendsScreen dark={true}/></DCArtboard>
    </DCSection>

    <DCSection id="centerpiece" title="综合时间轴 · 横屏全屏" subtitle="心率（左轴 · 红线）+ 速度（右轴 · 蓝散点）+ 顶部彩色组带 + 灰色组间休息底纹 + VL% 紫色警戒虚线 · 双指缩放 · 单指拖动 · 点击 rep 弹 popover">
      <DCArtboard id="land-light" label="横屏 · Light" width={874} height={402}><DetailLandscape dark={false}/></DCArtboard>
      <DCArtboard id="land-dark"  label="横屏 · Dark"  width={874} height={402}><DetailLandscape dark={true}/></DCArtboard>
    </DCSection>

    <DCSection id="other-tabs" title="其余 Tab + 设置" subtitle="Train · History · Profile">
      <DCArtboard id="train-light"   label="Train · Light"   width={402} height={874}><TrainScreen dark={false}/></DCArtboard>
      <DCArtboard id="history-light" label="History · Light" width={402} height={874}><HistoryScreen dark={false}/></DCArtboard>
      <DCArtboard id="profile-light" label="Profile · Light" width={402} height={874}><ProfileScreen dark={false}/></DCArtboard>
      <DCArtboard id="train-dark"   label="Train · Dark"   width={402} height={874}><TrainScreen dark={true}/></DCArtboard>
      <DCArtboard id="history-dark" label="History · Dark" width={402} height={874}><HistoryScreen dark={true}/></DCArtboard>
      <DCArtboard id="profile-dark" label="Profile · Dark" width={402} height={874}><ProfileScreen dark={true}/></DCArtboard>
    </DCSection>

    <DCSection id="onboarding" title="首次启动引导" subtitle="欢迎 → 价值主张 → HealthKit 授权 → 个人画像分步收集">
      <DCArtboard id="onb-1" label="01 · 欢迎"      width={402} height={874}><OnboardingWelcome/></DCArtboard>
      <DCArtboard id="onb-2" label="02 · 价值主张"  width={402} height={874}><OnboardingValue/></DCArtboard>
      <DCArtboard id="onb-3" label="03 · 健康授权"  width={402} height={874}><OnboardingPermissions/></DCArtboard>
      <DCArtboard id="onb-4" label="04 · 个人画像"  width={402} height={874}><OnboardingProfile/></DCArtboard>
    </DCSection>

    <DCSection id="system" title="设计系统 · 哲学 · 协同" subtitle="颜色 / 字体 / 间距 / 圆角 / 动效 token · 七条原则 · Watch ↔ iPhone 协作分工 · App Icon">
      <DCArtboard id="tokens"     label="Tokens · 完整表"      width={720}  height={1480}><TokensSheet dark={false}/></DCArtboard>
      <DCArtboard id="philosophy" label="设计哲学 · 七条"      width={720}  height={1080}><PhilosophyCard/></DCArtboard>
      <DCArtboard id="handoff"    label="Watch ↔ iPhone 协同"  width={720}  height={1080}><HandoffCard/></DCArtboard>
      <DCArtboard id="appicon"    label="App Icon · 速度向量"  width={720}  height={720}><AppIconCard/></DCArtboard>
    </DCSection>

      </DesignCanvas>
    </TweakProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
