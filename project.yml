# project.yml — XcodeGen specification
# Generates VBTrainer.xcodeproj from this declarative config + the Swift
# source files already on disk.
#
# Usage:
#   brew install xcodegen   # if not already
#   xcodegen generate
#
# Re-run xcodegen after adding/removing source files (it regenerates the
# .xcodeproj from this file). Do NOT edit the .xcodeproj by hand and
# expect changes to survive.

name: VBTrainer

options:
  bundleIdPrefix: com.vbtrainer
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: zh-Hans
  generateEmptyDirectories: true
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    # DEVELOPMENT_TEAM is provided by Signing.xcconfig (one-time local setup).
    # See README "Code signing" section.
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

# Shared file group — referenced by both targets.
fileGroups:
  - Shared
  - Tests

targets:

  # ─────────────────────────────────────────────────────────────
  # iOS App
  # ─────────────────────────────────────────────────────────────
  VBTrainer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VBTrainer
      - path: Shared
    resources: []
    dependencies:
      - target: VBTrainerWatch Watch App
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vbtrainer.app
        PRODUCT_NAME: VBTrainer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"            # iPhone only
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMotionUsageDescription: "VBTrainer 需要使用动作传感器记录训练数据，仅在主动训练时采集。"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "VBTrainer 读取心率、睡眠、HRV、体温等健康数据，用于训练前身体准备度评估和训练中心率监测。所有数据仅在本机处理，不上传服务器。"
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "VBTrainer 将训练记录写入 Apple 健康，方便你跨 App 查看训练历史。"
        INFOPLIST_KEY_NSCalendarsWriteOnlyAccessUsageDescription: "VBTrainer 将你安排的训练写入 iPhone 日历的「训练」日历，可在锁屏与日历 App 看到，并提前 30 分钟提醒。"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "用于把训练计划和已完成训练同步进 iPhone 日历，并维持双向编辑。"
        INFOPLIST_KEY_CFBundleDisplayName: "VBTrainer"
        CODE_SIGN_ENTITLEMENTS: VBTrainer/VBTrainer.entitlements

  # ─────────────────────────────────────────────────────────────
  # watchOS App (Modern Watch App — standalone target)
  # ─────────────────────────────────────────────────────────────
  VBTrainerWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: VBTrainerWatch Watch App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vbtrainer.app.watchkitapp
        PRODUCT_NAME: "VBTrainerWatch Watch App"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"            # watchOS
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_NSMotionUsageDescription: "VBTrainer 需要使用 Apple Watch 的动作传感器采集训练数据。"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "VBTrainer 读取心率、HRV、睡眠数据。所有数据仅在本机处理。"
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "VBTrainer 将训练记录写入 Apple 健康。"
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.vbtrainer.app
        INFOPLIST_KEY_WKBackgroundModes: ["workout-processing"]
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: "VBTrainerWatch Watch App/VBTrainerWatch.entitlements"

  # ─────────────────────────────────────────────────────────────
  # Tests (algorithm unit tests — populated in Proposal 2+)
  # ─────────────────────────────────────────────────────────────
  VBTrainerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
        # 这两个测试引用了 watchOS-only 的 LiveWorkoutController，
        # 在 iOS-only 的测试 target 里无法编译。后续 task：
        # 要么把 LiveWorkoutController 抽象到 Shared/，要么开一个
        # watchOS 的测试 target。先排除让 CI 能跑起来。
        excludes:
          - "AlgorithmTests/LiveWorkoutControllerVLTests.swift"
          - "UITests"  # XCUITest 在 UITests target 里编译，不属于 unit-test target
      - path: Shared
    dependencies:
      - target: VBTrainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vbtrainer.app.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VBTrainer.app/VBTrainer

  # ─────────────────────────────────────────────────────────────
  # UI Tests (XCUITest — black-box screen automation)
  # Separate target because:
  #   - 不同 product type: bundle.ui-testing vs bundle.unit-test
  #   - UI tests run outside the host app process (XCUITest 模式)
  #   - Linked to the iOS app via TEST_TARGET_NAME
  # ─────────────────────────────────────────────────────────────
  VBTrainerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UITests
    dependencies:
      - target: VBTrainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vbtrainer.app.uitests
        TEST_TARGET_NAME: VBTrainer

schemes:
  VBTrainer:
    build:
      targets:
        VBTrainer: all
        VBTrainerTests: [test]
        VBTrainerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VBTrainerTests
        - VBTrainerUITests
    archive:
      config: Release

  VBTrainerWatch Watch App:
    build:
      targets:
        VBTrainerWatch Watch App: all
    run:
      config: Debug
