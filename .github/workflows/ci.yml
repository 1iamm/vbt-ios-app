name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel older in-progress runs when a new commit lands on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Required so:
#   - failure-log + screenshot-summary steps can post PR comments
#   - gh release create can upload screenshot assets (contents: write)
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fast-fail:
    name: Static checks (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # Whether build/test/UI-test should run. true if any native code,
      # build config, or test file changed; false for pure docs/openspec
      # PRs. Reduces docs-only PR CI time from ~6min → ~30s.
      has_native_code: ${{ steps.scope.outputs.has_native_code }}
      # Subset of has_native_code — whether UI / View / schema changed
      # specifically (warrants the full UI test + screenshot pipeline).
      has_ui: ${{ steps.scope.outputs.has_ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Project structure check
        # Pure bash, instant. Enforces: no UI imports in Models/Algorithms,
        # no WatchKit in iOS target, no UIKit in Watch target, Views live
        # under Views/. See scripts/check-structure.sh for rules.
        run: bash scripts/check-structure.sh

      # Moved from build-test (where it ran after macOS spinup) — running
      # here on Linux means we know early whether to spawn build-test at
      # all. Docs-only PR skips the entire macOS job.
      - name: Detect change scope
        id: scope
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 300,
            });
            const paths = files.map(f => f.filename);

            // Native-code / build-affecting paths. If any match, we run
            // the macOS build-test job at all.
            const nativeRE = new RegExp([
              '\\.swift$',
              '^project\\.yml$',
              '^Signing\\.xcconfig$',
              '^\\.swiftlint\\.yml$',
              '^\\.swiftformat$',
              '^VBTrainer/.+\\.entitlements$',
              '^VBTrainerWatch Watch App/.+\\.entitlements$',
              '^\\.github/workflows/ci\\.yml$',
            ].join('|'));
            const hasNative = paths.some(p => nativeRE.test(p));

            // UI / View / schema subset — when true, also run UI test +
            // screenshot pipeline.
            const uiRE = new RegExp([
              '^VBTrainer/Views/',
              '^VBTrainerWatch Watch App/Views/',
              '^VBTrainerWatch Watch App/Sensors/',
              '^Shared/Theme/',
              '^Shared/Models/',
              '^VBTrainer/App/',
              '^VBTrainerWatch Watch App/App/',
              '^Tests/UITests/',
              '^Shared/Extensions/.+UITestMode',
              '^project\\.yml$',
            ].join('|'));
            const hasUI = paths.some(p => uiRE.test(p));

            core.setOutput('has_native_code', hasNative ? 'true' : 'false');
            core.setOutput('has_ui', hasUI ? 'true' : 'false');
            console.log(`Changed files: ${paths.length}`);
            console.log(`  has_native_code: ${hasNative}`);
            console.log(`  has_ui: ${hasUI}`);
            console.log(paths.slice(0, 30).map(p => `  ${p}`).join('\n'));

      - name: PR diff size warning
        # Advisory only — does NOT fail CI. Posts a comment if the PR is
        # large enough that a human-or-AI reviewer might miss things.
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const total = (pr.additions || 0) + (pr.deletions || 0);
            const WARN = 800;
            const LARGE = 1500;
            if (total < WARN) return;

            const tag = '<!-- pr-size-warning -->';
            const tier = total >= LARGE
              ? `🚨 **Very large PR** (${total} lines changed). Strongly consider splitting.`
              : `⚠️ **Large PR** (${total} lines changed). Review quality drops past ~${WARN} LOC — consider splitting.`;

            const body = `${tag}\n${tier}\n\n` +
              `Adds: +${pr.additions}, Deletes: -${pr.deletions}, Files: ${pr.changed_files}\n\n` +
              `_Posted by fast-fail. Advisory only — does not block merge._`;

            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.startsWith(tag));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

  build-test:
    needs: fast-fail
    # PR #61 (Round 1 fix · Cost #2 / DX F8): skip the whole macOS job
    # on docs-only / openspec-only / scripts-only / .github-only PRs.
    # Saves ~6 min per docs PR (the bulk of recent PRs).
    if: needs.fast-fail.outputs.has_native_code == 'true'
    name: Build + AlgorithmTests
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # macos-26 ships multiple Xcodes; project.yml targets 16.0.
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer 2>&1 | tee /tmp/xcode-select.log || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>&1 | tee -a /tmp/xcode-select.log

      - name: Print toolchain
        run: |
          xcodebuild -version 2>&1 | tee /tmp/toolchain.log
          swift --version 2>&1 | tee -a /tmp/toolchain.log

      - name: Cache Homebrew downloads
        # Caches bottle downloads so brew install reuses them. Doesn't cache
        # /opt/homebrew/Cellar directly (fragile across runner image changes);
        # cache hit is good enough — install becomes a copy not a download.
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ runner.os }}-xcodegen-swiftlint-swiftformat-xcparse-v2
          restore-keys: |
            brew-${{ runner.os }}-

      - name: Install xcodegen + linters
        run: brew install xcodegen swiftlint swiftformat 2>&1 | tee /tmp/brew-install.log

      - name: Cache DerivedData (incremental compile)
        # Round 1 Cost #1 + Round 2 Cost #C2-C3: caches Xcode's per-PR
        # compile artifacts so subsequent PRs reuse module/object files.
        #
        # Key strategy (rev. Round 2):
        #   Primary key hashes ONLY `project.yml` — the build-setting
        #   source of truth. Any one .swift change used to break the key
        #   (since the prior version hashed **/*.swift), driving every
        #   PR into restore-keys fallback. Now any swift edit reuses the
        #   same base cache; Xcode's incremental compiler invalidates
        #   per-file as needed. Restore-keys still catches the case where
        #   project.yml itself moves.
        #
        # NOTE on ModuleCache: actions/cache@v4 cannot exclude a
        # subdirectory inside `path:`. ModuleCache.noindex is therefore
        # included; historically it caused Swift module verification
        # warnings, not hard failures — Xcode regenerates on miss.
        # If we observe crashes attributable to ModuleCache reuse, switch
        # to caching `DerivedData/Build/` + `DerivedData/SourcePackages/`
        # explicitly instead of the whole directory.
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Developer/Xcode/SDKStatCaches.noindex
          key: derived-${{ runner.os }}-xcode26-${{ hashFiles('project.yml') }}
          restore-keys: |
            derived-${{ runner.os }}-xcode26-
            derived-${{ runner.os }}-

      # Phase A rollout: lint steps run but do NOT block CI yet.
      # After this PR merges, trigger `Format Baseline` workflow on main to
      # normalize existing files, then escalate these steps to required in a
      # follow-up PR (drop `continue-on-error`).
      - name: SwiftFormat (lint mode, advisory)
        continue-on-error: true
        run: swiftformat --lint . 2>&1 | tee /tmp/swiftformat.log

      - name: SwiftLint (advisory)
        continue-on-error: true
        run: swiftlint lint --reporter github-actions-logging 2>&1 | tee /tmp/swiftlint.log

      - name: Generate Xcode project
        run: xcodegen generate 2>&1 | tee /tmp/xcodegen.log

      # 注意：不传 -sdk。Xcode 会按 target.platform 自动选 SDK
      # （iOS target 用 iphonesimulator，被依赖的 watchOS target 用 watchsimulator）。
      # 传 -sdk iphonesimulator 会强制所有 target 用 iOS SDK，watchOS 子 target 会编译失败。
      - name: Pick simulator
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys;d=json.load(sys.stdin)['devices'];cands=[x for runt,xs in d.items() if 'iOS' in runt for x in xs if 'iPhone' in x['name']];print(sorted(cands,key=lambda x:x['name'])[-1]['udid'])")
          echo "Using simulator: $DEST" | tee /tmp/sim-pick.log
          echo "udid=$DEST" >> "$GITHUB_OUTPUT"

      - name: Start simulator boot (in background)
        # Round 1 Cost #6: boot now so it's warm by the time
        # test-without-building needs it. simctl boot returns immediately;
        # subsequent bootstatus -b blocks (or no-ops if already booted).
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" 2>&1 | tee /tmp/sim-boot-start.log || true

      # Round 1 Cost #3: switch from `xcodebuild build` (compile only)
      # to `xcodebuild build-for-testing` (compile app + test bundles
      # together). Eliminates the duplicate-compile that `xcodebuild test`
      # did when invoked twice (algorithm + UI).
      # 注意：不传 -sdk。Xcode 会按 target.platform 自动选 SDK
      # （iOS target 用 iphonesimulator，被依赖的 watchOS target 用 watchsimulator）。
      - name: Build iOS for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project VBTrainer.xcodeproj \
            -scheme VBTrainer \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee /tmp/build-ios.log

      - name: Build watchOS (simulator)
        # Standalone compile-only gate (watchOS scheme has no tests).
        # Note: we use a specific simulator (not 'generic') so the build
        # output is installable for the screenshot step that follows.
        id: build_watch
        run: |
          set -o pipefail
          # Pick a Watch simulator that's compatible with deploymentTarget 10.0.
          # The macos-26 runner has multiple — take the first listed Series.
          WATCH_UDID=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data["devices"].items():
              if "watchOS" not in runtime:
                  continue
              for d in devices:
                  if d.get("isAvailable") and "Apple Watch" in d.get("name", ""):
                      print(d["udid"])
                      sys.exit(0)
          ')
          echo "WATCH_UDID=$WATCH_UDID" >> $GITHUB_ENV
          echo "udid=$WATCH_UDID" >> $GITHUB_OUTPUT
          echo "Picked Watch sim: $WATCH_UDID"

          xcodebuild build \
            -project VBTrainer.xcodeproj \
            -scheme "VBTrainerWatch Watch App" \
            -destination "platform=watchOS Simulator,id=$WATCH_UDID" \
            -configuration Debug \
            -derivedDataPath /tmp/watch-dd \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee /tmp/build-watch.log

      - name: Capture watchOS screenshots
        # Boot the Watch sim, install the app, launch, and take a few
        # `xcrun simctl io ... screenshot` shots. Bypasses watchOS
        # XCUITest (historically flaky on simulators). Pure shell.
        if: needs.fast-fail.outputs.has_ui == 'true'
        env:
          WATCH_UDID: ${{ env.WATCH_UDID }}
        run: |
          set -e
          mkdir -p /tmp/screenshots
          if [ -z "$WATCH_UDID" ]; then
            echo "No Watch sim available; skipping Watch screenshots."
            exit 0
          fi
          # Locate the .app bundle from the watch-only DerivedData.
          APP_PATH=$(find /tmp/watch-dd/Build/Products -type d -name "VBTrainerWatch Watch App.app" -path "*watchsimulator*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Watch .app not found in derived data; listing for diagnostics:"
            find /tmp/watch-dd/Build/Products -type d -name "*.app" || true
            exit 0
          fi
          echo "Found Watch app at: $APP_PATH"

          xcrun simctl boot "$WATCH_UDID" 2>&1 || true
          xcrun simctl bootstatus "$WATCH_UDID" -b 2>&1 || true

          # Install + launch
          xcrun simctl install "$WATCH_UDID" "$APP_PATH" 2>&1
          xcrun simctl launch "$WATCH_UDID" com.vbtrainer.app.watchkitapp 2>&1 || true

          # Give it time to fully render
          sleep 6
          xcrun simctl io "$WATCH_UDID" screenshot /tmp/screenshots/20-watch-root.png 2>&1 || true
          ls -la /tmp/screenshots/20-watch-root.png 2>&1 || echo "Watch screenshot capture failed (non-fatal)"

      - name: Wait for simulator boot complete
        run: |
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b 2>&1 | tee /tmp/sim-boot.log

      - name: Run algorithm tests
        run: |
          set -o pipefail
          # 已知 flaky / 预存在失败（不是本 PR 引入，留作 follow-up）：
          # - JumpDetectorTests.testSyntheticThirtyCmJump：合成 30cm 跳跃信号目前不达检测阈值
          # RepDetectorTests.testCleanFiveReps 在 PR #68 修复后恢复运行。
          # test-without-building skips the recompile that `xcodebuild test`
          # would do — build-for-testing earlier already produced the bundle.
          xcodebuild test-without-building \
            -project VBTrainer.xcodeproj \
            -scheme VBTrainer \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:VBTrainerTests \
            -skip-testing:VBTrainerTests/JumpDetectorTests/testSyntheticThirtyCmJump \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee /tmp/test.log

      - name: Reset simulator before UI tests
        # Algorithm tests run inside the host app's process; SwiftData
        # writes survive to the simulator's container. Without erase,
        # UI tests may launch into MainTabsView (UserProfile exists)
        # instead of OnboardingView, failing the test.
        # After erase we re-boot since UI test needs a running simulator.
        if: needs.fast-fail.outputs.has_ui == 'true'
        run: |
          {
            xcrun simctl shutdown "${{ steps.sim.outputs.udid }}" 2>&1 || true
            xcrun simctl erase "${{ steps.sim.outputs.udid }}" 2>&1
            xcrun simctl boot "${{ steps.sim.outputs.udid }}" 2>&1 || true
            xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b 2>&1
          } | tee /tmp/simctl.log

      - name: Run UI tests
        # XCUITest takes a screenshot per step and stores them in the
        # .xcresult bundle. PR #5 reads them out and uploads as a release
        # for embedding in the PR comment.
        # test-without-building reuses build-for-testing output, saving
        # ~30s of duplicate compile.
        if: needs.fast-fail.outputs.has_ui == 'true'
        run: |
          set -o pipefail
          rm -rf /tmp/UITestResults.xcresult
          xcodebuild test-without-building \
            -project VBTrainer.xcodeproj \
            -scheme VBTrainer \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:VBTrainerUITests \
            -resultBundlePath /tmp/UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee /tmp/uitest.log

      - name: Extract screenshots from xcresult
        # xcparse pulls every XCTAttachment(screenshot:) into a directory.
        # Our test names attachments like 01-welcome, 02-value-prop, etc.,
        # so the output is already human-sortable.
        # Skipped on non-UI PRs (matching "Run UI tests" gate).
        if: always() && needs.fast-fail.outputs.has_ui == 'true'
        run: |
          {
            brew install chargepoint/xcparse/xcparse 2>&1
            mkdir -p /tmp/screenshots
            if [ -d /tmp/UITestResults.xcresult ]; then
              xcparse screenshots /tmp/UITestResults.xcresult /tmp/screenshots/ 2>&1
              find /tmp/screenshots -mindepth 2 -type f -name "*.png" -exec mv -n {} /tmp/screenshots/ \; 2>/dev/null || true
              find /tmp/screenshots -mindepth 1 -type d -empty -delete 2>/dev/null || true
              echo "Extracted:"
              ls -la /tmp/screenshots/ 2>&1 || true
            else
              echo "No xcresult bundle (UI test step probably did not run)."
            fi
          } | tee /tmp/extract.log

      - name: Publish screenshots as GitHub release asset
        # Per-PR release tagged `screenshots-pr-N`. On each push we
        # delete-and-recreate the release so the embedded PR-comment
        # image URLs stay stable for the *latest* commit. The release
        # lives forever after PR close — kept as a draft so it doesn't
        # pollute the public Releases page.
        if: always() && needs.fast-fail.outputs.has_ui == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          shopt -s nullglob
          shots=(/tmp/screenshots/*.png)
          if [ ${#shots[@]} -eq 0 ]; then
            echo "No screenshots — skipping release upload."
            exit 0
          fi
          TAG="screenshots-pr-$PR_NUMBER"
          # Always re-create so old assets from prior commits don't linger.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          # NOTE: was --draft, but draft-release asset download URLs
          # require GitHub auth. Browser <img src="…"> tag in the PR
          # comment can't auth → 404 → broken image icon. Switching to
          # --prerelease keeps the release out of the "Latest" badge
          # while making asset URLs public.
          gh release create "$TAG" \
            --prerelease \
            --title "Screenshots for PR #$PR_NUMBER" \
            --notes "Automated screenshots from commit \`$SHA\`. PR #$PR_NUMBER. Prerelease (not surfaced as Latest)." \
            "${shots[@]}"
          echo "Uploaded ${#shots[@]} screenshots to release $TAG."

      - name: Post screenshot summary comment to PR
        if: success() && needs.fast-fail.outputs.has_ui == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dir = '/tmp/screenshots';
            if (!fs.existsSync(dir)) {
              console.log('No screenshots dir — nothing to post.');
              return;
            }
            const pngs = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort();
            if (pngs.length === 0) {
              console.log('No PNG screenshots found.');
              return;
            }

            const prNum = parseInt(process.env.PR_NUMBER, 10);
            const tag = `screenshots-pr-${prNum}`;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;

            // Map filename → caption. xcparse emits files like
            //   01-welcome_0_<UUID>.png
            //   02-value-prop_0_<UUID>.png
            // where `_0_<UUID>` is xcparse's disambiguator when several
            // attachments share a name. Strip everything after the
            // human-readable label.
            const friendlyName = (filename) => {
              let s = filename.replace(/\.png$/, '');           // strip .png
              s = s.replace(/_\d+_[0-9A-F-]{8,}$/i, '');         // strip _N_<UUID>
              s = s.replace(/^\d+-/, '');                        // strip NN- ordering prefix
              return s.replace(/-/g, ' ');                       // dashes → spaces
            };

            const sha = context.sha.slice(0, 7);
            const tag_marker = '<!-- pr-screenshots -->';

            let body = `${tag_marker}\n## 🎬 自动验收 · 截图 (${sha})\n\n`;
            body += `测试跑通 \`OnboardingUITest.testOnboardingFlow\`，按以下顺序展示动线：\n\n`;
            body += `<table><tr>\n`;
            for (const png of pngs) {
              const url = `${baseUrl}/${encodeURIComponent(png)}`;
              body += `<td align="center" valign="top" width="200">\n`;
              body += `<a href="${url}"><img src="${url}" width="200"/></a><br/>\n`;
              body += `<sub><b>${friendlyName(png)}</b></sub>\n`;
              body += `</td>\n`;
            }
            body += `</tr></table>\n\n`;
            body += `<details><summary>验收说明</summary>\n\n`;
            body += `- 截图来源：每次 UI test pass 自动从 .xcresult bundle 提取\n`;
            body += `- 存储：Prerelease \`${tag}\`（每次 push 覆盖；PR close 时由 cleanup workflow 删）\n`;
            body += `- 点图可放大\n\n`;
            body += `</details>\n`;

            // Sticky comment — update existing one if present, otherwise create.
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.startsWith(tag_marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

      - name: Upload xcresult bundle (raw)
        # Still keep the raw .xcresult around for debugging.
        # Skipped on non-UI PRs (nothing to upload).
        if: always() && needs.fast-fail.outputs.has_ui == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: UITestResults-${{ github.sha }}
          path: /tmp/UITestResults.xcresult
          retention-days: 7
          if-no-files-found: warn

      # ──────────────────────────────────────────────────────────────────
      # On success, post a sticky test-summary comment so users see what
      # actually ran, not just "✅ checks passed". Parses the standard
      # xcodebuild output already in /tmp/test.log + /tmp/uitest.log.
      # Marker: <!-- pr-test-summary -->
      # ──────────────────────────────────────────────────────────────────
      - name: Post test summary comment to PR
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HAS_UI: ${{ needs.fast-fail.outputs.has_ui }}
        with:
          script: |
            const fs = require('fs');

            // ── Parse the top-level aggregate line ────────────────────────
            // xcodebuild emits two flavours:
            //   "Test Suite 'Selected tests' passed at ..."  (when -skip-testing
            //     filter active — used by our algorithm tests)
            //   "Test Suite 'All tests' passed at ..."        (no filter — used
            //     by our UI tests, hence the regex must accept both)
            // followed by:
            //   "Executed N tests, with M failures (K unexpected) in T (TT) seconds"
            const parseTopLevel = (path) => {
              if (!fs.existsSync(path)) return null;
              const txt = fs.readFileSync(path, 'utf8');
              const headerRe = /Test Suite '(Selected tests|All tests)' (passed|failed) at .+/g;
              let lastIdx = -1;
              let m;
              while ((m = headerRe.exec(txt)) !== null) {
                lastIdx = m.index;
              }
              if (lastIdx === -1) return null;
              const tail = txt.slice(lastIdx, lastIdx + 600);
              const exec = tail.match(
                /Executed (\d+) tests?, with (\d+) failures? \(\d+ unexpected\) in [\d.]+ \(([\d.]+)\) seconds/
              );
              if (!exec) return null;
              return {
                passed: /'(Selected tests|All tests)' passed/.test(tail),
                total: parseInt(exec[1], 10),
                failures: parseInt(exec[2], 10),
                wallSeconds: parseFloat(exec[3]),
              };
            };

            const algo = parseTopLevel('/tmp/test.log');
            const ui = process.env.HAS_UI === 'true' ? parseTopLevel('/tmp/uitest.log') : null;

            // List failing-test names for any non-empty failures.
            const failingTests = (path) => {
              if (!fs.existsSync(path)) return [];
              const txt = fs.readFileSync(path, 'utf8');
              // "Test Case '-[Module.Class testFoo]' failed (T seconds)"
              const re = /Test Case '-\[([^.\]]+\.)?([^.\]]+\s+\w+)\]' failed/g;
              const out = new Set();
              let m;
              while ((m = re.exec(txt)) !== null) {
                out.add(m[2]);
              }
              return [...out].sort();
            };

            const prNum = parseInt(process.env.PR_NUMBER, 10);
            const sha = context.sha.slice(0, 7);
            const tag_marker = '<!-- pr-test-summary -->';

            const fmtSection = (label, r, logPath) => {
              if (!r) return `### ${label}\n\n— 跳过（无相关代码改动）\n`;
              const okEmoji = r.failures === 0 ? '✅' : '❌';
              const lines = [`### ${label}\n`];
              lines.push(`${okEmoji} **${r.total - r.failures} / ${r.total}** 通过 · ${r.wallSeconds.toFixed(1)}s wall\n`);
              if (r.failures > 0) {
                const names = failingTests(logPath);
                if (names.length > 0) {
                  lines.push('\n**失败：**');
                  for (const n of names.slice(0, 10)) lines.push(`- \`${n}\``);
                  if (names.length > 10) lines.push(`- _（还有 ${names.length - 10} 个，详见上面失败 dump 评论）_`);
                  lines.push('');
                }
              }
              return lines.join('\n');
            };

            let body = `${tag_marker}\n## ✅ 测试通过 · \`${sha}\`\n\n`;
            body += fmtSection('AlgorithmTests (单元 + 算法)', algo, '/tmp/test.log');
            body += '\n';
            body += fmtSection('UITests (XCUITest + 截图)', ui, '/tmp/uitest.log');
            body += '\n<details><summary>说明</summary>\n\n';
            body += '- 来源：xcodebuild test 直接输出，每次 push 覆盖\n';
            body += '- 失败时此评论隐藏，由 `<!-- ci-failure -->` 评论替代\n';
            body += '- 想看具体哪些 case 跑了：点 Actions 页查看 raw 日志\n\n';
            body += '</details>\n';

            // Sticky: update existing if present.
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.startsWith(tag_marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

      # ──────────────────────────────────────────────────────────────────
      # Always-on diagnostic: on any failure above, post a triage comment
      # to the PR with the real errors. This closes the loop so AI agents
      # iterating in the cloud can read CI failures via the PR comments
      # API without needing GitHub Actions log access.
      # ──────────────────────────────────────────────────────────────────
      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Round 1 DX F1-F4: extended to cover ALL steps that previously
            // had silent failure modes. brew install / xcode-select / simctl
            // failures used to leave no trace in the dump; now they're
            // surfaced just like build/test logs.
            const sections = [
              { name: 'Select Xcode', file: '/tmp/xcode-select.log' },
              { name: 'Print toolchain', file: '/tmp/toolchain.log' },
              { name: 'Install xcodegen + linters', file: '/tmp/brew-install.log' },
              { name: 'SwiftFormat lint', file: '/tmp/swiftformat.log' },
              { name: 'SwiftLint', file: '/tmp/swiftlint.log' },
              { name: 'Generate Xcode project', file: '/tmp/xcodegen.log' },
              { name: 'Build iOS (simulator)',  file: '/tmp/build-ios.log' },
              { name: 'Build watchOS (simulator)', file: '/tmp/build-watch.log' },
              { name: 'Run algorithm tests', file: '/tmp/test.log' },
              { name: 'Reset simulator', file: '/tmp/simctl.log' },
              { name: 'Run UI tests', file: '/tmp/uitest.log' },
              { name: 'Extract screenshots', file: '/tmp/extract.log' },
            ];

            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // Round 1 DX F5: sticky failure comment. Re-uses the same
            // comment across pushes so PR doesn't pile up "❌ CI failed on
            // <sha>" entries — only the latest one is visible.
            const tagMarker = '<!-- ci-failure -->';

            // A section "succeeded" if its log ends with BUILD/TEST SUCCEEDED and
            // contains no actual error lines (excluding CoreData noise). We skip
            // those entirely so the comment focuses on the failing step.
            const ignoreRe = /CoreData: error:|CoreData: annotation:/;
            const realErrorRe = /(?:^|\s)(error:|fatal error:|\*\* (BUILD|TEST) FAILED \*\*|XCTAssertEqual failed|XCTAssertTrue failed|Test Case .* failed)/;

            function classify(content) {
              const lines = content.split('\n');
              const explicitSucceeded = /\*\* (BUILD|TEST) SUCCEEDED \*\*/.test(content);
              const explicitFailed = /\*\* (BUILD|TEST) FAILED \*\*/.test(content);
              const realErrors = lines.filter(l => realErrorRe.test(l) && !ignoreRe.test(l));
              // A step "succeeded" if it explicitly says so, OR if it has no
              // FAILED marker and no real errors (e.g. xcodegen prints no
              // SUCCEEDED line but is fine if it didn't error).
              const succeeded = explicitSucceeded || (!explicitFailed && realErrors.length === 0);
              return { lines, succeeded, realErrors };
            }

            let body = `${tagMarker}\n## ❌ CI failed on \`${sha}\`\n\n`;
            body += `Run: ${runUrl}\n\n`;

            // First pass: figure out which sections actually failed.
            const enriched = [];
            for (const s of sections) {
              if (!fs.existsSync(s.file)) continue;
              const content = fs.readFileSync(s.file, 'utf8');
              if (content.trim().length === 0) continue;
              const info = classify(content);
              enriched.push({ ...s, content, ...info });
            }

            const failingSections = enriched.filter(s => !s.succeeded);
            const summarySections = enriched.filter(s => s.succeeded);

            if (summarySections.length) {
              body += `**Passed steps:** ${summarySections.map(s => `\`${s.name}\``).join(', ')}\n\n`;
            }

            // Per-section budget: total 50K, divided among failing sections.
            const PER_BUDGET = Math.max(8000, Math.floor(50000 / Math.max(1, failingSections.length)));

            for (const s of failingSections) {
              body += `### ❌ ${s.name}\n\n`;

              const milestones = s.lines
                .filter(l => /^\*\*[^*]+\*\*/.test(l))
                .slice(-10);
              if (milestones.length) {
                body += `**Milestones:**\n\`\`\`\n${milestones.join('\n')}\n\`\`\`\n\n`;
              }

              if (s.realErrors.length) {
                const errs = s.realErrors.slice(-50);
                body += `**Errors (${s.realErrors.length}, last ${errs.length}):**\n\`\`\`\n${errs.join('\n').slice(0, 8000)}\n\`\`\`\n\n`;
              }

              // Tail of log, capped to remaining per-section budget.
              const tail = s.lines.slice(-200).join('\n');
              const capped = tail.length > PER_BUDGET ? '…' + tail.slice(-PER_BUDGET) : tail;
              body += `<details><summary>Last 200 lines of ${s.name.toLowerCase()}</summary>\n\n\`\`\`\n${capped}\n\`\`\`\n</details>\n\n`;
            }

            if (failingSections.length === 0) {
              body += `_All captured steps reported success — failure likely in a step before xcodegen (e.g. brew install / Xcode setup). Check the run page directly._\n`;
            }

            const MAX = 60000;
            if (body.length > MAX) {
              body = body.slice(0, MAX) + '\n\n_…truncated. See the run page for full output._';
            }

            // Sticky comment — update existing failure comment if present,
            // otherwise create a new one. Prevents pile-up across pushes.
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.startsWith(tagMarker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
